{% extends "base.html" %}

{% block title %}EVIDENCE LOG | SENTINEL ALPHA{% endblock %}

{% block content %}
<div class="h-[calc(100vh-64px)] bg-[#050914] text-slate-200 p-6 flex flex-col">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
    <div>
      <h1 class="text-3xl font-bold tracking-wider text-white">CLASSIFIED DETECTION LOGS</h1>
      <p class="text-xs text-cyan-400 tracking-widest">Evidence Archive • Neural Scan Feed</p>
    </div>

    <button id="refreshLogs"
      class="px-5 py-2 bg-cyan-400 text-black text-xs font-bold tracking-widest hover:bg-cyan-300 transition">
      REFRESH
    </button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

    <div class="bg-[#0e1520] p-4 border border-white/5 rounded-lg">
      <p class="text-xs text-slate-400">TOTAL LOGS</p>
      <h2 id="logCount" class="text-3xl text-emerald-400 font-bold">0</h2>
    </div>

    <div class="bg-[#0e1520] p-4 border border-white/5 rounded-lg">
      <p class="text-xs text-slate-400">HIGH ALERTS</p>
      <h2 id="liveCount" class="text-3xl text-red-400 font-bold">0</h2>
    </div>

    <div class="bg-[#0e1520] p-4 border border-white/5 rounded-lg">
      <p class="text-xs text-slate-400">ACCURACY</p>
      <h2 class="text-3xl text-cyan-400 font-bold">98%</h2>
    </div>

    <div class="bg-[#0e1520] p-4 border border-white/5 rounded-lg">
      <p class="text-xs text-slate-400">LATENCY</p>
      <h2 class="text-3xl text-amber-400 font-bold">14ms</h2>
    </div>

  </div>

  <!-- FILTERS -->
  <div class="flex flex-wrap gap-3 mb-6">
    <button class="filter-btn active">ALL</button>
    <button class="filter-btn">HIGH</button>
    <button class="filter-btn">MEDIUM</button>
    <button class="filter-btn">LOW</button>
  </div>

  <!-- GRID -->
  <div id="logsGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 overflow-y-auto flex-1 pr-2">
    <div class="flex items-center justify-center h-40 border border-white/10 text-slate-400">
      Loading logs...
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  const state = { logs: [], filter: 'ALL' };

  function getRiskColor(level) {
    if (level === 'High') return 'border-red-500';
    if (level === 'Medium') return 'border-amber-500';
    return 'border-emerald-500';
  }

  function updateCounters(logs) {
    document.getElementById('logCount').textContent = logs.length;
    const high = logs.filter(l => (l.risk_level || 'Low') === 'High').length;
    document.getElementById('liveCount').textContent = high;
  }

  function renderLogs() {
    const grid = document.getElementById('logsGrid');
    let logs = state.logs;

    if (state.filter !== 'ALL') {
      const map = { HIGH: 'High', MEDIUM: 'Medium', LOW: 'Low' };
      logs = logs.filter(l => (l.risk_level || 'Low') === map[state.filter]);
    }

    if (!logs.length) {
      grid.innerHTML = `<div class="col-span-full text-center text-slate-400">No Logs Found</div>`;
      return;
    }

    grid.innerHTML = logs.map(log => {
      const img = log.frame_file || log.image_file;
      const risk = log.risk_level || 'Low';
      const conf = (log.confidence || 0).toFixed(2);

      return `
      <div class="bg-[#0e1520] border ${getRiskColor(risk)} rounded-xl overflow-hidden shadow-md hover:shadow-cyan-500/10 transition group">

        <!-- IMAGE -->
        <div class="w-full h-44 overflow-hidden bg-black">
          <img src="/evidence/${img}" 
               class="w-full h-full object-cover group-hover:scale-105 transition duration-300" />
        </div>

        <!-- CONTENT -->
        <div class="p-4 flex flex-col gap-2">

          <div>
            <p class="text-xs text-slate-400">${log.class_name || 'Unknown'}</p>
            <h3 class="text-lg font-bold text-white">Confidence: ${conf}</h3>
          </div>

          <div class="flex justify-between text-xs text-slate-400">
            <span>${risk}</span>
            <span>${log.timestamp || ''}</span>
          </div>

          <button class="mt-2 py-2 border border-white/10 text-xs text-slate-300 hover:bg-white/10 transition">
            VIEW DETAILS
          </button>

        </div>
      </div>
    `;
    }).join('');
  }

  async function loadLogs() {
    try {
      const res = await fetch('/evidence');
      const data = await res.json();
      state.logs = Array.isArray(data) ? data : [];
      updateCounters(state.logs);
      renderLogs();
    } catch (err) {
      document.getElementById('logsGrid').innerHTML = '<div class="text-red-400">Error loading logs</div>';
    }
  }

  // FILTERS
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.innerText.trim();
      renderLogs();
    });
  });

  document.getElementById('refreshLogs').addEventListener('click', loadLogs);

  loadLogs();
</script>

<style>
  .filter-btn {
    padding: 6px 14px;
    font-size: 11px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #94a3b8;
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: #22d3ee;
    color: black;
    border-color: #22d3ee;
  }

  .filter-btn:hover:not(.active) {
    background: rgba(255, 255, 255, 0.05);
  }
</style>

{% endblock %}
